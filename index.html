<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPC创始人</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/apps.css">
<link rel="stylesheet" href="css/overlays.css">
</head>
<body>

<div id="desktop">
  <!-- Menu Bar -->
  <div id="menubar">
    <div id="menubar-left">
      <span class="apple-logo" id="apple-menu-trigger"></span>
      <span class="menu-item active-app" id="active-app-name">Finder</span>
      <span class="menu-item" data-menu="file">File</span>
      <span class="menu-item" data-menu="edit">Edit</span>
      <span class="menu-item" data-menu="view">View</span>
      <span class="menu-item game-week" id="game-week">第 1 周</span>
    </div>
    <div id="menubar-right">
      <div id="clock-controls" style="display:flex;align-items:center;gap:4px;margin-right:8px;"></div>
      <span class="icon" id="battery-icon">🔋</span>
      <span class="icon">📶</span>
      <span id="menubar-clock"></span>
    </div>
  </div>

  <!-- Dropdown Menus -->
  <div class="menu-dropdown" id="apple-dropdown" style="left:12px;">
    <div class="menu-dropdown-item">关于 OPC创始人</div>
    <div class="divider"></div>
    <div class="menu-dropdown-item" id="menu-settings">系统偏好设置... <span class="shortcut">⌘,</span></div>
    <div class="divider"></div>
    <div class="menu-dropdown-item" id="menu-save">保存游戏 <span class="shortcut">⌘S</span></div>
  </div>
  <div class="menu-dropdown" id="file-dropdown" style="left:80px;">
    <div class="menu-dropdown-item">新建窗口 <span class="shortcut">⌘N</span></div>
    <div class="menu-dropdown-item">关闭窗口 <span class="shortcut">⌘W</span></div>
  </div>
  <div class="menu-dropdown" id="edit-dropdown" style="left:120px;">
    <div class="menu-dropdown-item">撤销 <span class="shortcut">⌘Z</span></div>
    <div class="menu-dropdown-item">重做 <span class="shortcut">⇧⌘Z</span></div>
  </div>
  <div class="menu-dropdown" id="view-dropdown" style="left:162px;">
    <div class="menu-dropdown-item">整理桌面</div>
    <div class="divider"></div>
    <div class="menu-dropdown-item">显示所有窗口</div>
  </div>

  <!-- Window Container -->
  <div id="window-container" style="position:absolute;top:28px;left:0;right:0;bottom:56px;"></div>

  <!-- Context Menu -->
  <div id="context-menu">
    <div class="ctx-item" data-action="tidy">🧹 整理桌面</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" data-action="change-wallpaper">🎨 更换壁纸</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" data-action="about">ℹ️ 关于此游戏</div>
  </div>

  <!-- Dock -->
  <div id="dock"></div>

  <!-- Notifications -->
  <div id="notification-container"></div>

  <!-- Week Settlement Overlay -->
  <div id="week-settle-overlay">
    <div class="settle-box" id="settle-box-content"></div>
  </div>

  <!-- Consult Modal -->
  <div id="consult-modal"></div>

  <!-- Spotlight -->
  <div id="spotlight-overlay">
    <div id="spotlight-box">
      <input type="text" id="spotlight-input" placeholder="Spotlight 搜索" autocomplete="off">
      <div id="spotlight-results"></div>
    </div>
  </div>
</div>

<!-- Login Screen -->
<div id="login-screen" style="display:none;">
  <div class="avatar">🚀</div>
  <div class="login-title" id="login-title">OPC 创始人</div>
  <div class="login-subtitle" id="login-subtitle">你的创业模拟器</div>
  <div class="login-form">
    <div class="login-lang-row">
      <label id="login-lang-label" style="color:rgba(255,255,255,0.6);font-size:13px;margin-right:8px;">语言</label>
      <select id="login-lang-select" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#fff;padding:5px 10px;font-size:13px;outline:none;cursor:pointer;font-family:inherit;">
        <option value="zh" style="background:#1a1a2e;color:#fff;">中文</option>
        <option value="en" style="background:#1a1a2e;color:#fff;">English</option>
      </select>
    </div>
    <div class="pw-field">
      <input type="text" class="pw-input" id="login-name-input" placeholder="输入你的名字开始" maxlength="20" autocomplete="off">
    </div>
    <button class="login-btn" id="login-btn">开始 →</button>
    <div class="login-hint" id="login-hint">按回车或点击按钮继续</div>
  </div>
</div>

<script src="js/ui.js"></script>

</body>
</html>
